services:
  - type: web
    name: mixxpay-agents
    runtime: python
    repo: https://github.com/TON-USERNAME/mixxpay-agents
    plan: free
    region: frankfurt
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn mixxpay_agents.wsgi:application --timeout 120 --workers 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mixxpay-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: pay-agent-mixx.onrender.com
      - key: KOBO_TOKEN
        sync: false
      - key: KOBO_UID_CREATION
        sync: false
      - key: KOBO_UID_SUIVI
        sync: false

databases:
  - name: mixxpay-db
    databaseName: mixxpay_db
    user: mixxpay_user
    plan: free
    region: frankfurt